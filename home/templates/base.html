<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-KyZXEAg3QhqLMpG8r+8fhAXLRk2vvoC2f3B09zVXn8CA5QIVfZOJ3BCsw2P0p/We" crossorigin="anonymous">

  <title>{% block title %} {% endblock %}</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box
    }
.card-title{
    background:#198754;
    color:white !important;
    border-radius:15px;
    padding:5px 12px;
    font-weight:bold;
    transition:.3s;
}

.card-text{
     background:#198754;
    color:white !important;
    border-radius:25px;
     padding:5px 12px;
    font-weight:bold;
    transition:.3s;
}

    .display-4{
    background-color:#c950c7;
    text-align:center;
    padding:20px;
    border-radius:10px;
    font-size:60px;
    font-weight:bold;
}
    input[type=text],
    input[type=password] {
      width: 100%;
      padding: 15px;
      margin: 5px 0 22px 0;
      display: inline-block;
      border: none;
      background: #f1f1f1;
    }

/* .nav-link{
    background:#3f47bb;
    color:white !important;
    border-radius:25px;
     padding:5px 12px;
     margin: 10px 10px 10px 10px;
    font-weight:bold;
    transition:.3s;
} */
 .nav-link{
    background-color: #192987;   /* Green */
    color: white !important;
    border-radius: 25px;
    padding: 8px 18px;
    margin: 0 8px;
    font-weight: 600;
    text-align: center;
    transition: all 0.3s ease;
}

.nav-link:hover{
    background-color: #14236c;   /* Dark Green */
    color: white !important;
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}


    input[type=text]:focus,
    input[type=password]:focus {
      background-color: #ddd;
      outline: none;
    }

    hr {
      border: 1px solid #f1f1f1;
      margin-bottom: 25px;
    }

    button:hover {
      opacity: 1;
    }

    .container {
      padding: 16px;
    }
    .navbar {
            background-color: #71cc0971;
        }
  </style>
  {% block css %} {% endblock %}
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-light sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Car_Rental_Booking_System</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="/">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="/customer_login/">Customer Login</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="/car_dealer_login/">Car Dealer Login</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
  {% block body %}
  {% endblock %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-U1DAWAznBHeqEIlVSCgzq+c9gqGAJn5c/t99JyeKa9xxaYpSvHU5awsuZVVFIhvj"
    crossorigin="anonymous"></script>

  {% block js %} {% endblock %}
</body>
</html>
